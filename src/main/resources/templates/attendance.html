<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Attendance</h1>
        <div class="actions">
            <a class="btn secondary" th:href="@{/home}">Back to Home</a>
            <a class="btn" th:href="@{/profile}">Profile</a>
        </div>

        <div th:if="${!isStudent}" class="message">Attendance is available for student accounts only.</div>

        <table th:if="${isStudent}">
            <thead>
            <tr>
                <th>Date</th>
                <th>Present</th>
                <th>Course</th>
                <th>Teacher</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="attendance : ${dashboard.attendances}">
                <td th:text="${attendance.attendanceDate}"></td>
                <td th:text="${attendance.present ? 'Yes' : 'No'}"></td>
                <td th:text="${attendance.courseName}"></td>
                <td th:text="${attendance.teacherName}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(dashboard.attendances)}">
                <td colspan="4">No attendance records available.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
