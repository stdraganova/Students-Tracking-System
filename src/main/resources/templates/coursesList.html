<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Course List</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Courses</h1>
            <button type="button" class="circle-btn" onclick="openAddCourseModal()" title="Add new course">+</button>
        </div>
        <div class="actions">
            <a class="btn secondary" th:href="@{/home}">Back to Home</a>
        </div>

        <div th:if="${created}" class="message success">Course created successfully.</div>
        <div th:if="${courseError}" class="message error">Failed to create course. Please provide valid values.</div>

        <table>
            <thead>
            <tr>
                <th>Course Name</th>
                <th>Teacher</th>
                <th style="text-align: center; width: 60px;">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.name()}"></td>
                <td th:text="${course.teacher()}"></td>
                <td style="text-align: center;">
                    <a th:href="@{/admin/courses/{courseId}/delete(courseId=${course.id()})}"
                       class="delete-btn"
                       onclick="return confirm('Delete this course?');"
                       title="Delete course">
                        ✕
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(courses)}">
                <td colspan="3" style="text-align: center;">No courses available.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add Course Modal -->
<div id="addCourseModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Add New Course</h2>
            <button type="button" class="close-btn" onclick="closeAddCourseModal()">&times;</button>
        </div>

        <form th:action="@{/admin/courses-list}" th:object="${courseCreateForm}" method="post" onsubmit="return validateCourseForm()">
            <div class="modal-body">
                <label for="name">Course Name</label>
                <input id="name" th:field="*{name}" type="text" required placeholder="Enter course name">

                <label for="teacherId">Teacher</label>
                <select id="teacherId" th:field="*{teacherId}" required>
                    <option value="">Select teacher</option>
                    <option th:each="teacher : ${teachers}"
                            th:value="${teacher.id()}"
                            th:text="${teacher.fullName()}"></option>
                </select>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn secondary" onclick="closeAddCourseModal()">Cancel</button>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn">Add Course</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openAddCourseModal() {
        document.getElementById('addCourseModal').style.display = 'flex';
    }

    function closeAddCourseModal() {
        document.getElementById('addCourseModal').style.display = 'none';
    }

    function validateCourseForm() {
        var name = document.getElementById('name').value.trim();
        var teacherId = document.getElementById('teacherId').value.trim();

        if (!name || !teacherId) {
            alert('Please fill in all fields.');
            return false;
        }
        return true;
    }

    // Close modal when clicking outside of it
    window.onclick = function(event) {
        var modal = document.getElementById('addCourseModal');
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }
</script>

</body>
</html>
