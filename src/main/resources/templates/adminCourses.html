<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin - Courses</title>
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container">
	<div class="card">
		<h1>Admin Course Management</h1>
		<div class="actions">
			<a class="btn secondary" th:href="@{/home}">Back to Home</a>
			<a class="btn" th:href="@{/profile}">Profile</a>
		</div>

		<div th:if="${created}" class="message success">Course created successfully.</div>
		<div th:if="${courseError}" class="message error">Failed to create course. Please provide valid values.</div>

		<form th:action="@{/admin/courses}" th:object="${courseCreateForm}" method="post">
			<label for="name">Course Name</label>
			<input id="name" th:field="*{name}" type="text" required>

			<label for="teacherId">Teacher</label>
			<select id="teacherId" th:field="*{teacherId}" required>
				<option value="">Select teacher</option>
				<option th:each="teacher : ${teachers}"
						th:value="${teacher.id}"
						th:text="${teacher.fullName}"></option>
			</select>

			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit">Create Course</button>
		</form>
	</div>
</div>
</body>
</html>
