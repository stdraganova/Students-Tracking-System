<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>User Profile</h1>
        <div class="actions">
            <a class="btn secondary" th:href="@{/home}">Back to Home</a>
        </div>

        <div th:if="${updated}" class="message success">Profile updated successfully.</div>
        <div th:if="${profileError}" class="message error">Profile update failed. Please check your input.</div>

        <form th:action="@{/profile/update}" th:object="${profileUpdateForm}" method="post">
            <table class="profile-edit-table">
                <tbody>
                <tr>
                    <th>Role</th>
                    <td th:text="${profile.role}"></td>
                    <td></td>
                </tr>
                <tr>
                    <th>Username</th>
                    <td><input id="username" th:field="*{username}" type="text" readonly required></td>
                    <td><button type="button" class="icon-btn" onclick="enableEdit('username')" title="Edit username">&#9998;</button></td>
                </tr>
                <tr>
                    <th>First Name</th>
                    <td><input id="firstName" th:field="*{firstName}" type="text" readonly required></td>
                    <td><button type="button" class="icon-btn" onclick="enableEdit('firstName')" title="Edit first name">&#9998;</button></td>
                </tr>
                <tr>
                    <th>Last Name</th>
                    <td><input id="lastName" th:field="*{lastName}" type="text" readonly required></td>
                    <td><button type="button" class="icon-btn" onclick="enableEdit('lastName')" title="Edit last name">&#9998;</button></td>
                </tr>
                <tr>
                    <th>Email</th>
                    <td><input id="email" th:field="*{email}" type="email" readonly required></td>
                    <td><button type="button" class="icon-btn" onclick="enableEdit('email')" title="Edit email">&#9998;</button></td>
                </tr>
                <tr>
                    <th>Profile Picture URL</th>
                    <td><input id="profilePictureUrl" th:field="*{profilePictureUrl}" type="text" readonly></td>
                    <td><button type="button" class="icon-btn" onclick="enableEdit('profilePictureUrl')" title="Edit profile picture url">&#9998;</button></td>
                </tr>
                <tr>
                    <th>New Password</th>
                    <td><input id="password" th:field="*{password}" type="password" readonly minlength="6" placeholder="Leave empty to keep current password"></td>
                    <td><button type="button" class="icon-btn" onclick="enableEdit('password')" title="Edit password">&#9998;</button></td>
                </tr>
                </tbody>
            </table>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Save Changes</button>
        </form>
    </div>
</div>

<script>
    function enableEdit(fieldId) {
        var field = document.getElementById(fieldId);
        if (!field) {
            return;
        }
        field.removeAttribute('readonly');
        field.focus();
    }
</script>
</body>
</html>
